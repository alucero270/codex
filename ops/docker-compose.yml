services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: strata-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - strata-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  strata-api:
    container_name: strata-api
    build:
      context: ..
      dockerfile: ops/Dockerfile.api
    image: strata-api:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Ensure postgres is accepting TCP connections before starting the API.
    entrypoint:
      - /bin/bash
      - -ec
      - |
        until (echo > /dev/tcp/postgres/5432) >/dev/null 2>&1; do
          echo "Waiting for postgres on postgres:5432..."
          sleep 2
        done
        echo "Postgres reachable, starting Strata API"
        exec dotnet Codex.Api.dll
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${STRATA_DB_CONNECTION}
      Codex__DocsRootPath: ${STRATA_SOURCES}
      Logging__LogLevel__Default: ${STRATA_LOG_LEVEL:-Information}
    ports:
      - "${STRATA_API_PORT:-8080}:8080"
    volumes:
      # Sources stay read-only so Strata cannot mutate upstream content.
      - type: bind
        source: ${STRATA_SOURCES}
        target: ${STRATA_SOURCES}
        read_only: true

  strata-indexer:
    container_name: strata-indexer
    build:
      context: ..
      dockerfile: ops/Dockerfile.indexer
    image: strata-indexer:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Ensure postgres is accepting TCP connections before starting the worker.
    entrypoint:
      - /bin/bash
      - -ec
      - |
        until (echo > /dev/tcp/postgres/5432) >/dev/null 2>&1; do
          echo "Waiting for postgres on postgres:5432..."
          sleep 2
        done
        echo "Postgres reachable, starting Strata Indexer"
        exec dotnet Codex.Indexer.dll
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Default: ${STRATA_DB_CONNECTION}
      Codex__DocsRootPath: ${STRATA_SOURCES}
      Logging__LogLevel__Default: ${STRATA_LOG_LEVEL:-Information}
    volumes:
      # Sources stay read-only so Strata cannot mutate upstream content.
      - type: bind
        source: ${STRATA_SOURCES}
        target: ${STRATA_SOURCES}
        read_only: true

  strata-embedder:
    container_name: strata-embedder
    build:
      context: ..
      dockerfile: ops/Dockerfile.embedder
    image: strata-embedder:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Ensure postgres is accepting TCP connections before starting the worker.
    entrypoint:
      - /bin/bash
      - -ec
      - |
        until (echo > /dev/tcp/postgres/5432) >/dev/null 2>&1; do
          echo "Waiting for postgres on postgres:5432..."
          sleep 2
        done
        echo "Postgres reachable, starting Strata Embedder"
        exec dotnet Codex.Embedder.dll
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Default: ${STRATA_DB_CONNECTION}
      Codex__DocsRootPath: ${STRATA_SOURCES}
      STRATA_EMBED_PROVIDER: ${STRATA_EMBED_PROVIDER}
      STRATA_EMBED_MODEL: ${STRATA_EMBED_MODEL}
      Logging__LogLevel__Default: ${STRATA_LOG_LEVEL:-Information}
    volumes:
      # Sources stay read-only so Strata cannot mutate upstream content.
      - type: bind
        source: ${STRATA_SOURCES}
        target: ${STRATA_SOURCES}
        read_only: true

  ollama:
    image: ollama/ollama:latest
    container_name: strata-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "${STRATA_OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  strata-postgres-data:
  ollama-data:
